name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Next.js static export)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify export output
        run: |
          test -f out/index.html
          test -f out/404.html
          test -f out/concepts/caching/index.html
          test -f out/case-studies/url-shortener/index.html
          echo "Static export OK — $(find out -name '*.html' | wc -l) pages."

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-export
          path: out
          retention-days: 7
